<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoothie & Donuts</title>
    <!--CSS FILES-->
    <link rel="stylesheet" href="./resources/css/basic.css">
    <link rel="stylesheet" href="./resources/css/contact.css">
    <!--FONTS FILES-->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka&family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>Smoothie <br> & Donuts</h1>
            <!-- <p>A smoothie is always a good idea !<br> with a donut ? without a doubt ! </p> -->
        </div>

        <nav class="navbar">
            <ul>
                <li><a href="index.html">The Newbees</a></li>
                <li><a href="smoothies.html">The Smoothies</a></li>
                <li><a href="donuts.html">The Donuts</a></li>
                <li><a href="team.html">The Team</a></li>
            </ul>
        </nav>

    </header>

    <main>
        <div class="container">
            <h2>CONTACT US</h2>
            <form action="">

                <div class="contact">
                    <div class="first">
                        <label for="first">First Name
                            <input type="text" name="first" placeholder="Jean" id="first">
                        </label>
                      
                    </div>

                    <div class="last">
                        <label for="last">Last Name
                            <input type="text" name="last" placeholder="Dupont" id="last">

                        </label>
                        
                    </div>

                    <div class="email">
                        <label for="email">Email Address
                            <input type="text" name="email" placeholder="jean.dupont@dupont.com" id="email" size="30">
                        </label>
                        
                    </div>

                    <div class="message">
                        <label for="message">We're all ears !
                            <br>
                            <textarea name="message" id="message" placeholder="Bonjour," cols="30" rows="5"></textarea>    

                        </label>
                        
                    </div>

                    <input type="submit" name="submit" id="submit">
                </div>
                

                

            </form>
        </div>
       
      


    </main>

    <footer>
        <p>©Smoothie & Donuts 2022</p>
        <a href="contact.html">Contact us</a>
    </footer>
    
</body>
</html>
