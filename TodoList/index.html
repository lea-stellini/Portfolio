<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
    <link rel="icon" href="image/todo.png">
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <!-- JavaScript -->
    <script src="script.js" defer></script>
    
    
</head>
<body>

    <form id="form">
        <label for="input">To do list</label>
        <input type="text"  name="input" id="input" placeholder="Que dois-tu faire ?" autocomplete="off" size="30" maxlength="30">
        
        <ul class="todos" id="todos"></ul>

        <span>Un clique gauche pour rayer une to do. <br> 
            Un clique droit pour la supprimer.</span>

    </form>
    
</body>
</html>
